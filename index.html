<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE QSO – Login / Registro</title>
<style>
body{margin:0;font-family:Segoe UI,sans-serif;background:#5677c2;color:#ff9900;display:flex;justify-content:center;align-items:center;height:100vh;}
.card{width:360px;background: #ccff66;padding:25px;border-radius:16px;box-shadow:0 15px 40px rgba(0,0,0,.6);}
h1{text-align:center;color: #e62e00;margin:0 0 15px;}
input{width:100%;padding:10px;margin:10px 0;border-radius:10px;border:2px solid #334155;background:#020617;color:white;}
button{width:100%;padding:14px;border:none;border-radius:10px;margin-top:10px;font-weight:bold;cursor:pointer;}
.login{background:#22c55e;color:#0e2aa4;}
.register{background:#38bdf8;color:#020617;}
.msg{text-align:center;margin-top:12px;font-size:.1em;color:#f87171;}
</style>
</head>
<body>

<div class="card">
  <h1>LIVE QSO</h1>
  <input id="indicativo" placeholder="Indicativo (solo admin EA7ZC primero)">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Contraseña">
  <button class="login" onclick="login()">Entrar</button>
  <button class="register" onclick="register()">Registrarse</button>
  <div id="msg" class="msg"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// Configuración de Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBy5xlIVPNcAoxMj9XEAPQg61emdI9KhnY",
  authDomain: "live-qso-local-9d479.firebaseapp.com",
  databaseURL: "https://live-qso-local-9d479-default-rtdb.firebaseio.com",
  projectId: "live-qso-local-9d479",
  storageBucket: "live-qso-local-9d479.firebasestorage.app",
  messagingSenderId: "575830304961",
  appId: "1:575830304961:web:68801041ca39a2eeec8c40"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ===== LOGIN =====
function login(){
  msg.innerText="";
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(res=>{
    location.href="inicio.html";
  })
  .catch(e=>msg.innerText=e.message);
}

// ===== REGISTRO CONTROLADO =====
function register(){
  const ind = indicativo.value.trim().toUpperCase();
  const em = email.value.trim();
  const pw = password.value.trim();

  if(!ind || !em || !pw){
    msg.innerText="Completa todos los campos";
    return;
  }

  db.ref("users").once("value").then(snap=>{
    // Primer registro: admin EA7ZC
    if(!snap.exists()){
      if(ind !== "EA7ZC"){
        msg.innerText="Primero debes registrarte como admin (EA7ZC)";
        return;
      }
      auth.createUserWithEmailAndPassword(em,pw)
      .then(res=>{
        db.ref("users/"+res.user.uid).set({
          indicativo: ind,
          email: em,
          role: "admin",
          group: "admin",
          blocked: false
        });
        msg.innerText="Admin registrado correctamente. Ahora inicia sesión";
      })
      .catch(e=>msg.innerText=e.message);
      return;
    }

    // Solo usuarios pre-registrados pueden registrarse después
    if(ind === "EA7ZC"){
      msg.innerText="El admin ya está registrado";
      return;
    }

    db.ref("preregistrados/"+ind).once("value").then(psnap=>{
      if(!psnap.exists()){
        msg.innerText="Usuario no autorizado. Contacta con admin";
        return;
      }
      const grupo = psnap.val().group;
      auth.createUserWithEmailAndPassword(em,pw)
      .then(res=>{
        db.ref("users/"+res.user.uid).set({
          indicativo: ind,
          email: em,
          role: "user",
          group: grupo,
          blocked: false
        });
        db.ref("preregistrados/"+ind).remove();
        msg.innerText="Registro correcto, ahora inicia sesión";
      })
      .catch(e=>msg.innerText=e.message);
    });
  });
}

// ===== SESIÓN AUTOMÁTICA =====
auth.onAuthStateChanged(u=>{
  if(u) location.href="inicio.html";
});
</script>
</body>
</html>
