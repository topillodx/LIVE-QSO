<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin LIVE QSO</title>
<style>
body{
  margin:0;
  font-family:Segoe UI,Arial,sans-serif;
  background:linear-gradient(135deg,#eef2ff,#c7d2fe);
  color:#111827;
}

/* Header con banner grande */
header{
  background:#6366f1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:white;
  padding:0;
  position:relative;
}
header img{
  width:100%;
  max-height:200px;
  object-fit:cover;
}
header h1{
  margin:8px 0;
  font-size:2em;
  font-weight:bold;
  color:#facc15;
  text-shadow:1px 1px 2px #00000080;
}
header button{
  background:#facc15;
  color:#111827;
  font-weight:bold;
  border:none;
  padding:12px 20px;
  border-radius:10px;
  cursor:pointer;
  font-size:1.1em;
  margin-bottom:8px;
  transition:all 0.2s ease;
}
header button:hover{
  transform:scale(1.05);
  background:#eab308;
}

.container{
  padding:20px;
  display:grid;
  gap:20px;
}

/* Cards */
.card{
  background:white;
  border-radius:12px;
  padding:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
.card h2{
  margin-top:0;
  color:#4f46e5;
  font-size:1.3em;
}

/* Inputs y selects */
input,select{
  padding:8px;
  border-radius:6px;
  border:1px solid #c7d2fe;
  font-size:1em;
}

/* Botones */
.btn{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  margin-left:4px;
  font-size:0.95em;
}
.btn-create{background:#22c55e;color:white;}
.btn-edit{background:#f97316;color:white;}
.btn-delete{background:#ef4444;color:white;}
.btn-block{background:#facc15;color:#111827;}

/* Listas flexibles */
.list{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:10px;
}
.item{
  background:#f3f4f6;
  padding:8px 10px;
  border-radius:8px;
  display:flex;
  align-items:center;
  gap:6px;
}
.item span{font-weight:bold;font-size:1em;}

/* Tabla usuarios */
.user-table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  font-size:1em;
}
.user-table th, .user-table td{
  padding:8px 10px;
  border-bottom:1px solid #e5e7eb;
  text-align:left;
}
.user-table th{color:#4f46e5;font-weight:bold;}
.user-table td span.indicativo{
  color:#15803d;
  font-weight:bold;
}
</style>
</head>
<body>

<header>
  <img src="img/liveqso.png" alt="LIVE QSO Banner">
  <h1>PANEL ADMIN</h1>
<div id="userInfo">—</div>

<div id="userBar">
  <button class="user-btn" style="background:#f97316;color:white;font-weight:bold;" onclick="location.href='live.html'">📡 LIVE QSOs</button>
<button class="user-btn" onclick="location.href='inicio.html'">🏠 Inicio</button>
  <button class="user-btn" onclick="location.href='estadisticas.html'">📊 Estadísticas</button>
  <button class="user-btn" onclick="location.href='Diplomas.html'">🏠 Diplomas</button>
  <button class="user-btn" onclick="location.href='ADIF.html'">📁 ADIF</button>
  <button class="user-btn" onclick="location.href='Ranking.html'">🏆 Ranking</button>
  <button class="user-btn" onclick="logout()">🚪 Salir</button>
  <button class="user-btn" id="adminBtn" style="display:none" onclick="location.href='admin.html'">⚙️ Admin</button>
</div>
</header>

<div class="container">

  <!-- GRUPOS -->
  <div class="card">
    <h2>Grupos</h2>
    <input id="groupName" placeholder="Nuevo nombre de grupo">
    <button class="btn btn-create" onclick="createGroup()">Crear grupo</button>
    <div id="groupList" class="list"></div>
  </div>

  <!-- PREUSUARIOS -->
  <div class="card">
    <h2>Preusuarios</h2>
    <input id="preIndicativo" placeholder="Indicativo">
    <select id="preGroup"></select>
    <button class="btn btn-create" onclick="addPreUser()">Añadir preusuario</button>
    <div id="preList" class="list"></div>
  </div>

  <!-- USUARIOS REGISTRADOS -->
  <div class="card">
    <h2>Usuarios Registrados</h2>
    <table class="user-table" id="userList">
      <thead>
        <tr>
          <th>Indicativo</th>
          <th>Email</th>
          <th>Grupo</th>
          <th>Rol</th>
          <th>Cambiar Grupo</th>
          <th>Guardar</th>
          <th>Bloquear</th>
          <th>Borrar</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyBy5xlIVPNcAoxMj9XEAPQg61emdI9KhnY",
  authDomain:"live-qso-local-9d479.firebaseapp.com",
  databaseURL:"https://live-qso-local-9d479-default-rtdb.firebaseio.com",
  projectId:"live-qso-local-9d479",
  storageBucket:"live-qso-local-9d479.firebasestorage.app",
  messagingSenderId:"575830304961",
  appId:"1:575830304961:web:68801041ca39a2eeec8c40"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ===== SESIÓN =====
auth.onAuthStateChanged(u=>{
  if(!u) return location.href="login.html";
  db.ref("users/"+u.uid).once("value").then(s=>{
    if(!s.val() || s.val().role!=="admin") location.href="inicio.html";
  });
});

// ===== BOTÓN INICIO =====
function goInicio(){ window.location.href="inicio.html"; }

// ===== GRUPOS =====
function createGroup(){
  const name = groupName.value.trim();
  if(!name) return;
  db.ref("groups/"+name).set(true);
  groupName.value="";
}

function renameGroup(oldName,newName){
  if(!newName) return;
  db.ref("groups/"+oldName).once("value").then(snap=>{
    db.ref("groups/"+newName).set(snap.val());
    db.ref("groups/"+oldName).remove();
    db.ref("preregistrados").once("value").then(ps=>{
      ps.forEach(p=>{
        if(p.val().group === oldName){
          db.ref("preregistrados/"+p.key+"/group").set(newName);
        }
      });
    });
    db.ref("users").once("value").then(us=>{
      us.forEach(u=>{
        if(u.val().group===oldName){
          db.ref("users/"+u.key+"/group").set(newName);
        }
      });
    });
  });
}

function deleteGroup(name){
  if(!confirm("Borrar grupo "+name+"?")) return;
  db.ref("groups/"+name).remove();
}

// Actualizar lista de grupos
db.ref("groups").on("value",snap=>{
  groupList.innerHTML="";
  preGroup.innerHTML="";
  snap.forEach(s=>{
    const name = s.key;
    const div = document.createElement("div");
    div.classList.add("item");
    const span = document.createElement("span");
    span.style.color="#1e40af";
    span.innerText = name;
    div.appendChild(span);

    const btnRename = document.createElement("button");
    btnRename.classList.add("btn-edit");
    btnRename.innerText = "Renombrar";
    btnRename.onclick = ()=> {
      const newName = prompt("Nuevo nombre para " + name, name);
      if(newName && newName!==name) renameGroup(name,newName);
    };
    div.appendChild(btnRename);

    const btnDelete = document.createElement("button");
    btnDelete.classList.add("btn-delete");
    btnDelete.innerText = "Borrar";
    btnDelete.onclick = ()=> {
      if(confirm("Borrar grupo "+name+"?")) deleteGroup(name);
    };
    div.appendChild(btnDelete);

    groupList.appendChild(div);
    preGroup.innerHTML += `<option>${name}</option>`;
  });
});

// ===== PREUSUARIOS =====
function addPreUser(){
  const ind = preIndicativo.value.trim().toUpperCase();
  const grp = preGroup.value;
  if(!ind) return;
  db.ref("preregistrados/"+ind).set({group:grp});
  preIndicativo.value="";
}

db.ref("preregistrados").on("value",snap=>{
  preList.innerHTML="";
  snap.forEach(s=>{
    const div = document.createElement("div");
    div.classList.add("item");
    div.innerHTML=`<span>${s.key}</span> → ${s.val().group}
      <button class="btn-delete" onclick="db.ref('preregistrados/${s.key}').remove()">Borrar</button>`;
    preList.appendChild(div);
  });
});

// ===== USUARIOS =====
db.ref("users").on("value",snap=>{
  const tbody = document.querySelector("#userList tbody");
  tbody.innerHTML="";
  snap.forEach(s=>{
    const u = s.val();
    const tr = document.createElement("tr");

    const tdInd = document.createElement("td");
    tdInd.innerHTML = `<span class="indicativo">${u.indicativo}</span>`;
    tr.appendChild(tdInd);

    const tdEmail = document.createElement("td");
    tdEmail.innerText = u.email;
    tr.appendChild(tdEmail);

    const tdGroup = document.createElement("td");
    tdGroup.innerText = u.group;
    tr.appendChild(tdGroup);

    const tdRole = document.createElement("td");
    tdRole.innerText = u.role;
    tr.appendChild(tdRole);

    const tdSelect = document.createElement("td");
    const selectGrp = document.createElement("select");
    db.ref("groups").once("value").then(gs=>{
      selectGrp.innerHTML = "";
      gs.forEach(g=>{
        const opt = document.createElement("option");
        opt.value = g.key;
        opt.innerText = g.key;
        if(g.key === u.group) opt.selected = true;
        selectGrp.appendChild(opt);
      });
    });
    tdSelect.appendChild(selectGrp);
    tr.appendChild(tdSelect);

    const tdSave = document.createElement("td");
    const btnSave = document.createElement("button");
    btnSave.classList.add("btn-edit");
    btnSave.innerText = "Guardar";
    btnSave.onclick = ()=> db.ref("users/"+s.key+"/group").set(selectGrp.value);
    tdSave.appendChild(btnSave);
    tr.appendChild(tdSave);

    const tdBlock = document.createElement("td");
    const btnBlock = document.createElement("button");
    btnBlock.classList.add("btn-block");
    btnBlock.innerText = u.blocked?"Desbloquear":"Bloquear";
    btnBlock.onclick = ()=> db.ref("users/"+s.key+"/blocked").set(!u.blocked);
    tdBlock.appendChild(btnBlock);
    tr.appendChild(tdBlock);

    const tdDel = document.createElement("td");
    const btnDel = document.createElement("button");
    btnDel.classList.add("btn-delete");
    btnDel.innerText = "Borrar";
    btnDel.onclick = ()=> db.ref("users/"+s.key).remove();
    tdDel.appendChild(btnDel);
    tr.appendChild(tdDel);

    tbody.appendChild(tr);
  });
});
</script>
</body>
</html>
